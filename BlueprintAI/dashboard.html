<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlueprintAI | Official Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --sidebar: #1e293b;
            --text: #334155;
            --white: #ffffff;
            --success: #22c55e;
            --accent: #4ade80;
        }

        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; background: var(--bg); color: var(--text); overflow: hidden; }

        /* --- Sidebar --- */
        nav { width: 240px; background: var(--sidebar); color: white; padding: 20px; display: flex; flex-direction: column; flex-shrink: 0; }
        nav h2 { font-size: 1.2rem; margin-bottom: 30px; color: var(--primary); }
        .nav-label { font-size: 0.7rem; color: #64748b; text-transform: uppercase; margin: 20px 0 10px 5px; letter-spacing: 1px; }
        nav a { color: #cbd5e1; text-decoration: none; padding: 10px; border-radius: 8px; margin-bottom: 5px; display: block; font-size: 0.9rem; transition: 0.2s; }
        nav a:hover { background: #334155; color: white; }

        /* --- Dashboard --- */
        main { flex-grow: 1; padding: 30px; overflow-y: auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
        .card { background: var(--white); padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        
        .table-container { background: white; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 15px 20px; text-align: left; border-bottom: 1px solid #f1f5f9; }
        th { background: #f8fafc; font-weight: 600; color: #64748b; font-size: 0.85rem; }
        tbody tr { cursor: pointer; transition: 0.2s; }
        tbody tr:hover { background: #f8fafc; }

        .badge { padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 700; background: #dcfce7; color: #15803d; }
        .badge-processing { background: #fef9c3; color: #854d0e; }

        /* --- CAD Workspace Modal --- */
        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); }
        .cad-container { background: #1a1a1a; width: 95%; height: 92vh; margin: 4vh auto; border-radius: 12px; display: flex; flex-direction: column; overflow: hidden; }
        .toolbar { padding: 12px 20px; background: #2d2d2d; display: flex; align-items: center; border-bottom: 1px solid #444; gap: 10px; }
        .workspace-grid { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 180px; flex-grow: 1; background: #333; gap: 2px; }
        
        .panel { background: #1e1e1e; display: flex; flex-direction: column; position: relative; }
        .panel-header { background: #252526; padding: 10px 15px; font-size: 0.7rem; color: #888; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid #333; }
        
        textarea { flex-grow: 1; background: transparent; color: #9cdcfe; border: none; padding: 20px; font-family: 'Consolas', monospace; font-size: 14px; outline: none; resize: none; line-height: 1.5; }
        #viewer-3d { flex-grow: 1; background: #000; }
        #translator-output { padding: 15px; color: var(--accent); font-family: monospace; font-size: 0.85rem; white-space: pre; overflow-y: auto; background: #111; }

        button { padding: 8px 16px; border-radius: 6px; border: none; cursor: pointer; font-weight: 600; transition: 0.2s; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-ghost { background: transparent; color: #ccc; border: 1px solid #555; }
        .btn-ghost:hover { background: #444; }
    </style>
</head>
<body>

    <nav>
        <h2>BlueprintAI</h2>
        <a href="#" class="active">🏠 Dashboard</a>
        <div class="nav-label">Ref Library</div>
        <a href="#" onclick="openWorkspace('Ref: Cube', 'cube([15, 15, 15], center=true);')">📦 cube</a>
        <a href="#" onclick="openWorkspace('Ref: Sphere', 'sphere(r = 12);')">🌐 sphere</a>
        <a href="#" onclick="openWorkspace('Ref: Cylinder', 'cylinder(h = 25, r = 10);')">🔋 cylinder</a>
        <a href="#" onclick="openWorkspace('Ref: Cone', 'cylinder(h = 20, r1 = 12, r2 = 0);')">🍦 cone</a>
    </nav>

    <main>
        <div class="header">
            <h1>Object Library</h1>
            <input type="file" id="file-input" style="display: none;" accept="image/*" onchange="handleFileUpload(event)">
            <button class="btn-primary" onclick="triggerUpload()">+ Create New Object</button>
        </div>

        <div class="stats-grid">
            <div class="card"><small>Total Blueprints</small><h2 id="stat-total">1</h2></div>
            <div class="card"><small>Engine Status</small><h2 style="color: var(--success)">Online</h2></div>
            <div class="card"><small>Recent Sprints</small><h2>0</h2></div>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr><th>Preview</th><th>Project Name</th><th>Status</th><th>Created</th></tr>
                </thead>
                <tbody id="data-table">
                    <tr onclick="openWorkspace('Example Gear', 'cylinder(h=5, r=15, $fn=50);')">
                        <td>⚙️</td>
                        <td><strong>Example Gear</strong></td>
                        <td><span class="badge">Ready</span></td>
                        <td>Published</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <div id="workspace-modal" class="modal">
        <div class="cad-container">
            <div class="toolbar">
                <span id="modal-title" style="color: white; font-weight: bold; margin-right: 20px;">Workspace</span>
                <button class="btn-primary" onclick="render3D()">▶ Update Preview</button>
                <button class="btn-ghost" onclick="copyToClipboard()">📋 Copy OpenSCAD Code</button>
                <button class="btn-ghost" style="margin-left: auto;" onclick="closeModal()">Close</button>
            </div>
            
            <div class="workspace-grid">
                <div class="panel">
                    <div class="panel-header">OpenSCAD Editor (.scad)</div>
                    <textarea id="code-editor" spellcheck="false" oninput="syncTranslator()"></textarea>
                </div>
                
                <div class="panel">
                    <div class="panel-header">Live 3D Viewport</div>
                    <div id="viewer-3d"></div>
                </div>
                
                <div class="panel" style="grid-column: span 2;">
                    <div class="panel-header">OpenSCAD Translator</div>
                    <div id="translator-output"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let scene, camera, renderer, currentMesh;
        let objectCount = 1;

        // --- Dashboard Logic ---
        function triggerUpload() { document.getElementById('file-input').click(); }

        function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            const name = file.name.split('.')[0];
            const table = document.getElementById('data-table');
            const row = table.insertRow(0);
            
            // Set row content with the "Processing" badge just like the original
            row.innerHTML = `
                <td>🖼️</td>
                <td><strong>${name}</strong></td>
                <td><span class="badge badge-processing">Analyzing...</span></td>
                <td>Just Now</td>
            `;

            objectCount++;
            document.getElementById('stat-total').innerText = objectCount;

            // Auto-open workspace after a short delay to simulate "Analysis"
            setTimeout(() => {
                row.cells[2].innerHTML = `<span class="badge">Ready</span>`;
                openWorkspace(name, `// BlueprintAI generated code\n// Source: ${file.name}\n\ncube([20, 10, 5], center=true);`);
            }, 1500);

            row.onclick = () => openWorkspace(name, `cube([20, 10, 5], center=true);`);
        }

        // --- Workspace Logic ---
        function openWorkspace(name, code) {
            document.getElementById('workspace-modal').style.display = "block";
            document.getElementById('modal-title').innerText = "Project: " + name;
            document.getElementById('code-editor').value = code;
            
            if (!renderer) initThreeJS();
            render3D();
            syncTranslator();
        }

        function closeModal() { document.getElementById('workspace-modal').style.display = "none"; }

        function initThreeJS() {
            const container = document.getElementById('viewer-3d');
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, container.clientWidth / container.clientHeight, 0.1, 1000);
            camera.position.set(25, 25, 25);
            camera.lookAt(0,0,0);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            container.appendChild(renderer.domElement);
            scene.add(new THREE.AmbientLight(0x505050));
            const light = new THREE.PointLight(0xffffff, 1.2);
            light.position.set(20, 30, 20);
            scene.add(light);
            animate();
        }

        function render3D() {
            if (currentMesh) scene.remove(currentMesh);
            const code = document.getElementById('code-editor').value.toLowerCase();
            let geo;

            // Extract values for dynamic rendering
            const r = parseFloat(code.match(/r\s*=\s*(\d+)/)?.[1]) || 10;
            const h = parseFloat(code.match(/h\s*=\s*(\d+)/)?.[1]) || 20;
            const r2 = parseFloat(code.match(/r2\s*=\s*(\d+)/)?.[1]);

            if (code.includes("sphere")) geo = new THREE.SphereGeometry(r, 32, 32);
            else if (code.includes("cylinder")) {
                geo = new THREE.CylinderGeometry(r2 === 0 ? 0.1 : r, r, h, 32);
            } else {
                const d = code.match(/\[(.*?)\]/)?.[1].split(',').map(n => parseFloat(n)) || [10, 10, 10];
                geo = new THREE.BoxGeometry(d[0]||10, d[1]||10, d[2]||10);
            }

            currentMesh = new THREE.Mesh(geo, new THREE.MeshPhongMaterial({ color: 0x2563eb }));
            scene.add(currentMesh);
        }

        function syncTranslator() {
            const raw = document.getElementById('code-editor').value;
            document.getElementById('translator-output').innerText = "// Target: OpenSCAD (Desktop)\n\n" + raw;
        }

        function copyToClipboard() {
            const text = document.getElementById('code-editor').value;
            navigator.clipboard.writeText(text);
            alert("Code copied to clipboard!");
        }

        function animate() {
            requestAnimationFrame(animate);
            if (currentMesh) currentMesh.rotation.y += 0.005;
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
