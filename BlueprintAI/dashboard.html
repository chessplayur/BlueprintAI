<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlueprintAI | Professional OS</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --sidebar: #0f172a;
            --panel: #1e293b;
            --text-dark: #1e293b;
            --text-light: #64748b;
            --white: #ffffff;
            --border: #e2e8f0;
            --accent: #4ade80;
        }

        * { box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; margin: 0; display: flex; height: 100vh; background: var(--bg); color: var(--text-dark); overflow: hidden; }

        /* --- Sidebar --- */
        nav { width: 260px; background: var(--sidebar); color: white; padding: 24px; display: flex; flex-direction: column; flex-shrink: 0; z-index: 10; }
        nav h2 { font-size: 1.25rem; margin-bottom: 32px; color: var(--primary); font-weight: 800; cursor: pointer; }
        .nav-label { font-size: 0.7rem; color: #475569; text-transform: uppercase; margin: 24px 0 12px 5px; letter-spacing: 1px; font-weight: 700; }
        nav a { color: #cbd5e1; text-decoration: none; padding: 12px; border-radius: 8px; margin-bottom: 4px; display: block; font-size: 0.9rem; transition: 0.2s; cursor: pointer; }
        nav a:hover, nav a.active { background: #1e293b; color: white; }
        nav a.highlight { border: 1px solid var(--primary); color: var(--primary); font-weight: 600; margin-top: 10px; text-align: center; }

        /* --- Main Content --- */
        .view-content { flex-grow: 1; height: 100vh; position: relative; display: flex; flex-direction: column; min-width: 0; }
        .page { display: none; height: 100%; width: 100%; overflow: hidden; }
        .page.active { display: flex; flex-direction: column; }

        /* --- DASHBOARD PAGE --- */
        #dashboard-page { padding: 40px; overflow-y: auto; }
        .header-container { display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; gap: 20px; width: 100%; }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; margin-bottom: 32px; }
        .card { background: white; padding: 24px; border-radius: 16px; border: 1px solid var(--border); box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        .card small { color: var(--text-light); text-transform: uppercase; font-size: 0.7rem; font-weight: 700; }
        .card h2 { margin: 8px 0 0 0; font-size: 1.5rem; }

        .table-container { background: white; border-radius: 16px; border: 1px solid var(--border); overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 16px 24px; text-align: left; border-bottom: 1px solid var(--border); }
        th { background: #f8fafc; color: var(--text-light); font-size: 0.8rem; }
        tbody tr:hover { background: #f1f5f9; cursor: pointer; }

        /* --- AI CREATOR PAGE --- */
        #ai-creator-page { background: #020617; color: white; }
        .editor-toolbar { height: 64px; background: #000; border-bottom: 1px solid #1e293b; display: flex; align-items: center; padding: 0 24px; justify-content: space-between; }
        .editor-grid { display: grid; grid-template-columns: 320px 1fr 400px; flex-grow: 1; overflow: hidden; }
        .panel { display: flex; flex-direction: column; border-right: 1px solid #1e293b; height: 100%; }
        .panel-header { background: #0f172a; padding: 12px 16px; font-size: 10px; color: #64748b; text-transform: uppercase; font-weight: 800; }
        textarea { flex-grow: 1; background: #020617; color: #9cdcfe; border: none; padding: 20px; font-family: monospace; outline: none; resize: none; font-size: 13px; line-height: 1.6; }
        #viewer-3d { flex-grow: 1; background: #000; }
        #chat-history { flex-grow: 1; padding: 20px; overflow-y: auto; font-size: 13px; color: #cbd5e1; display: flex; flex-direction: column; gap: 12px; }
        .chat-input-box { padding: 20px; border-top: 1px solid #1e293b; display: flex; gap: 10px; background: #020617; }
        .chat-input-box input { flex-grow: 1; background: #1e293b; border: 1px solid #334155; color: white; padding: 10px; border-radius: 6px; outline: none; }

        .btn { padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 13px; border: none; transition: 0.2s; white-space: nowrap; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-save { background: var(--accent); color: #064e3b; }
        .badge { padding: 4px 12px; border-radius: 99px; font-size: 0.7rem; background: #dcfce7; color: #15803d; font-weight: 700; }
    </style>
</head>
<body>

    <nav>
        <h2 onclick="showPage('dashboard')">BlueprintAI</h2>
        <a onclick="showPage('dashboard')" id="link-dash" class="active">🏠 Dashboard</a>
        <a onclick="openEmptyCreator()" id="link-ai" class="highlight">✨ AI Creator</a>
        
        <div class="nav-label">Saved Projects</div>
        <div id="sidebar-projects"></div>
    </nav>

    <div class="view-content">
        <div id="dashboard-page" class="page active">
            <div class="header-container">
                <div>
                    <h1 style="margin:0; font-size: 1.8rem;">Object Library</h1>
                    <p style="color: var(--text-light); margin: 4px 0 0 0;">Select a blueprint to edit.</p>
                </div>
                <div>
                    <button class="btn btn-primary" onclick="triggerUpload()">+ New Blueprint</button>
                    <input type="file" id="file-input" style="display: none;" accept="image/*" onchange="handleFileUpload(event)">
                </div>
            </div>

            <div class="stats-grid">
                <div class="card"><small>Total Blueprints</small><h2 id="stat-total">0</h2></div>
                <div class="card"><small>AI Engine</small><h2 style="color: var(--success)">Active</h2></div>
                <div class="card"><small>Sync Status</small><h2>Local Storage</h2></div>
            </div>

            <div class="table-container">
                <table>
                    <thead><tr><th>Icon</th><th>Blueprint Name</th><th>Status</th><th>Last Edit</th></tr></thead>
                    <tbody id="data-table"></tbody>
                </table>
            </div>
        </div>

        <div id="ai-creator-page" class="page">
            <div class="editor-toolbar">
                <div>
                    <span id="active-title" style="color: #64748b; font-size: 13px;">EDITOR / </span>
                    <span id="project-name-display" style="font-weight: 700; color: white;">UNSAVED DRAFT</span>
                </div>
                <div style="display: flex; gap: 12px;">
                    <button id="save-btn" class="btn btn-save" onclick="saveCurrentWork()">💾 Save Project</button>
                    <button class="btn btn-primary" onclick="render3D()">Render Model</button>
                </div>
            </div>
            <div class="editor-grid">
                <div class="panel">
                    <div class="panel-header">AI Assistant</div>
                    <div id="chat-history"></div>
                    <div class="chat-input-box">
                        <input type="text" id="ai-prompt" placeholder="Ask AI to modify..." onkeydown="if(event.key==='Enter') askAI()">
                        <button class="btn btn-primary" onclick="askAI()">Send</button>
                    </div>
                </div>
                <div class="panel">
                    <div class="panel-header">OpenSCAD Source</div>
                    <textarea id="code-editor" spellcheck="false" oninput="render3D()"></textarea>
                </div>
                <div class="panel" style="border: none;"><div class="panel-header">3D Viewport</div><div id="viewer-3d"></div></div>
            </div>
        </div>
    </div>

    <script>
        let scene, camera, renderer, currentMesh, controls;
        let projects = JSON.parse(localStorage.getItem('bp_projects')) || [];
        let currentEditingId = null;

        window.onload = () => {
            updateProjectLists();
            renderTable();
        };

        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId + '-page').classList.add('active');
            document.getElementById('link-dash').classList.remove('active');
            document.getElementById('link-ai').classList.remove('active');
            if(pageId === 'dashboard') document.getElementById('link-dash').classList.add('active');
            else {
                document.getElementById('link-ai').classList.add('active');
                if(!renderer) initThreeJS();
            }
        }

        function updateProjectLists() {
            const sidebar = document.getElementById('sidebar-projects');
            sidebar.innerHTML = '';
            projects.forEach(p => {
                sidebar.innerHTML += `<a onclick="loadProject('${p.id}')">${p.icon} ${p.name}</a>`;
            });
            document.getElementById('stat-total').innerText = projects.length;
            localStorage.setItem('bp_projects', JSON.stringify(projects));
        }

        function renderTable() {
            const table = document.getElementById('data-table');
            table.innerHTML = '';
            projects.forEach(p => {
                const row = table.insertRow();
                row.onclick = () => loadProject(p.id);
                row.innerHTML = `<td>${p.icon}</td><td><strong>${p.name}</strong></td><td><span class="badge">Ready</span></td><td>Now</td>`;
            });
        }

        function openEmptyCreator() {
            currentEditingId = null; // Mark as unsaved draft
            document.getElementById('project-name-display').innerText = "UNSAVED DRAFT";
            document.getElementById('code-editor').value = 'cube([20,20,20], center=true);';
            document.getElementById('save-btn').innerText = "💾 Save Project";
            showPage('ai-creator');
            if(renderer) render3D();
        }

        function saveCurrentWork() {
            const code = document.getElementById('code-editor').value;
            
            if (currentEditingId === null) {
                // It's a new project
                const name = prompt("Enter a name for your new blueprint:", "New Object");
                if (!name) return;
                
                const newProj = { id: Date.now(), name: name, code: code, icon: '📦' };
                projects.push(newProj);
                currentEditingId = newProj.id;
                document.getElementById('project-name-display').innerText = name.toUpperCase();
            } else {
                // Update existing project
                const index = projects.findIndex(p => p.id == currentEditingId);
                projects[index].code = code;
            }

            updateProjectLists();
            renderTable();
            
            const btn = document.getElementById('save-btn');
            btn.innerText = "✅ Saved!";
            setTimeout(() => { btn.innerText = "💾 Save Project"; }, 2000);
        }

        function loadProject(id) {
            const project = projects.find(p => p.id == id);
            if(!project) return;
            currentEditingId = id;
            document.getElementById('project-name-display').innerText = project.name.toUpperCase();
            document.getElementById('code-editor').value = project.code;
            showPage('ai-creator');
            if(renderer) render3D();
        }

        function triggerUpload() { document.getElementById('file-input').click(); }

        function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            const name = file.name.split('.')[0];
            const newProj = { id: Date.now(), name: name, code: 'sphere(r=15);', icon: '🖼️' };
            projects.push(newProj);
            updateProjectLists();
            renderTable();
            loadProject(newProj.id);
        }

        function initThreeJS() {
            const container = document.getElementById('viewer-3d');
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
            camera.position.set(50, 50, 50);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            container.appendChild(renderer.domElement);
            scene.add(new THREE.GridHelper(100, 40, 0x222222, 0x111111));
            scene.add(new THREE.AmbientLight(0xffffff, 0.8));
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            animate();
        }

        function render3D() {
            if (currentMesh) scene.remove(currentMesh);
            const code = document.getElementById('code-editor').value.toLowerCase();
            let geo;
            const r = parseFloat(code.match(/r\s*=\s*([\d.]+)/)?.[1]) || 10;
            const h = parseFloat(code.match(/h\s*=\s*([\d.]+)/)?.[1]) || 20;
            if (code.includes("sphere")) geo = new THREE.SphereGeometry(r, 32, 32);
            else if (code.includes("cylinder")) geo = new THREE.CylinderGeometry(r, r, h, 32);
            else geo = new THREE.BoxGeometry(15, 15, 15);
            currentMesh = new THREE.Mesh(geo, new THREE.MeshPhongMaterial({ color: 0x2563eb }));
            scene.add(currentMesh);
        }

        function askAI() {
            const input = document.getElementById('ai-prompt');
            const history = document.getElementById('chat-history');
            if (!input.value) return;
            history.innerHTML += `<div><strong>YOU:</strong> ${input.value}</div>`;
            input.value = "";
            setTimeout(() => { history.innerHTML += `<div><strong>AI:</strong> Logic updated. Click Save to keep changes.</div>`; }, 600);
        }

        function animate() { requestAnimationFrame(animate); if(controls) controls.update(); renderer.render(scene, camera); }
    </script>
</body>
</html>
