<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlueprintAI | Editor</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        :root { --primary: #2563eb; --dark: #020617; --panel: #0f172a; --border: #1e293b; --accent: #4ade80; }
        body, html { margin: 0; padding: 0; height: 100vh; font-family: 'Inter', sans-serif; background: var(--dark); color: white; overflow: hidden; }
        
        .layout { display: grid; grid-template-columns: 350px 1fr 450px; grid-template-rows: 60px 1fr; height: 100vh; }
        
        header { grid-column: span 3; background: #000; border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 20px; justify-content: space-between; }
        
        /* Sidebar, Editor, and Viewport panels */
        .panel { display: flex; flex-direction: column; border-right: 1px solid var(--border); background: var(--dark); position: relative; }
        .panel-header { background: #0f172a; padding: 10px 15px; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #64748b; border-bottom: 1px solid var(--border); }
        
        /* Elements */
        textarea { flex-grow: 1; background: transparent; color: #9cdcfe; border: none; padding: 20px; font-family: 'Consolas', monospace; font-size: 14px; outline: none; resize: none; line-height: 1.6; }
        #viewer-3d { flex-grow: 1; background: #050505; }
        #chat-history { flex-grow: 1; padding: 15px; overflow-y: auto; font-size: 13px; display: flex; flex-direction: column; gap: 10px; }
        .chat-input { padding: 15px; border-top: 1px solid var(--border); display: flex; gap: 10px; }
        input { flex-grow: 1; background: #1e293b; border: 1px solid var(--border); color: white; padding: 8px; border-radius: 4px; outline: none; }
        
        button { padding: 8px 15px; border-radius: 5px; border: none; cursor: pointer; font-weight: 600; font-size: 12px; }
        .btn-blue { background: var(--primary); color: white; }
        .btn-dark { background: #1e293b; color: #94a3b8; }
        .btn-dark:hover { background: #334155; }
    </style>
</head>
<body>

<div class="layout">
    <header>
        <div style="font-weight: bold; color: var(--primary);">BLUEPRINT AI <span style="color: #444; margin: 0 10px;">|</span> <span id="project-name-display" style="color: white;">New Project</span></div>
        <div style="display: flex; gap: 10px;">
            <button class="btn-dark" onclick="window.location.href='index.html'">← Dashboard</button>
            <button class="btn-dark" onclick="downloadSCAD()">Download .SCAD</button>
            <button class="btn-blue" onclick="render3D()">Update Model</button>
        </div>
    </header>

    <div class="panel">
        <div class="panel-header">AI CAD Assistant</div>
        <div id="chat-history">
            <div style="color: #64748b;"><em>Ask me to modify dimensions, add holes, or change shapes.</em></div>
        </div>
        <div class="chat-input">
            <input type="text" id="ai-prompt" placeholder="Command AI..." onkeydown="if(event.key==='Enter') askAI()">
            <button class="btn-blue" onclick="askAI()">Send</button>
        </div>
    </div>

    <div class="panel">
        <div class="panel-header">Source Code (.scad)</div>
        <textarea id="code-editor" spellcheck="false" oninput="render3D()"></textarea>
    </div>

    <div class="panel" style="border-right: none;">
        <div class="panel-header">3D Viewport (X-Red, Y-Green, Z-Blue)</div>
        <div id="viewer-3d"></div>
        <div style="height: 150px; background: #000; border-top: 1px solid var(--border); padding: 15px; font-family: monospace; font-size: 11px; color: var(--accent); overflow-y: auto;">
            <div>> System Initialized</div>
            <div>> Viewport Stable</div>
            <div id="console-log">> Ready for instruction...</div>
        </div>
    </div>
</div>

<script>
    let scene, camera, renderer, currentMesh, controls;

    // 1. Initial Setup
    window.onload = () => {
        initThreeJS();
        
        // Load data from Dashboard
        const savedName = localStorage.getItem('currentProjectName') || "Untitled";
        const savedCode = localStorage.getItem('currentProjectCode') || "cube([10,10,10], center=true);";
        
        document.getElementById('project-name-display').innerText = savedName;
        document.getElementById('code-editor').value = savedCode;
        
        render3D();
    };

    function initThreeJS() {
        const container = document.getElementById('viewer-3d');
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(50, container.clientWidth / container.clientHeight, 0.1, 1000);
        camera.position.set(40, 40, 40);
        
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        container.appendChild(renderer.domElement);

        scene.add(new THREE.GridHelper(100, 40, 0x222222, 0x111111));
        scene.add(new THREE.AxesHelper(20));
        scene.add(new THREE.AmbientLight(0xffffff, 0.7));
        
        const light = new THREE.PointLight(0xffffff, 1);
        light.position.set(30, 50, 30);
        scene.add(light);

        controls = new THREE.OrbitControls(camera, renderer.domElement);
        animate();
    }

    function render3D() {
        if (currentMesh) scene.remove(currentMesh);
        const code = document.getElementById('code-editor').value.toLowerCase();
        let geo;

        // Dynamic Parsing
        const r = parseFloat(code.match(/r\s*=\s*([\d.]+)/)?.[1]) || 10;
        const h = parseFloat(code.match(/h\s*=\s*([\d.]+)/)?.[1]) || 20;

        if (code.includes("sphere")) {
            geo = new THREE.SphereGeometry(r, 32, 32);
        } else if (code.includes("cylinder")) {
            geo = new THREE.CylinderGeometry(r, r, h, 32);
        } else {
            const d = code.match(/\[(.*?)\]/)?.[1]?.split(',').map(n => parseFloat(n)) || [15, 15, 15];
            geo = new THREE.BoxGeometry(d[0]||15, d[1]||15, d[2]||15);
        }

        currentMesh = new THREE.Mesh(geo, new THREE.MeshPhongMaterial({ color: 0x2563eb }));
        scene.add(currentMesh);
    }

    async function askAI() {
        const input = document.getElementById('ai-prompt');
        const history = document.getElementById('chat-history');
        if (!input.value) return;

        history.innerHTML += `<div style="color: var(--primary); margin-top:10px;"><strong>You:</strong> ${input.value}</div>`;
        const prompt = input.value.toLowerCase();
        input.value = "";

        // Simulated AI response
        const msg = document.createElement('div');
        msg.innerHTML = "<strong>AI:</strong> Re-calculating mesh...";
        history.appendChild(msg);

        setTimeout(() => {
            msg.innerHTML = "<strong>AI:</strong> Geometry updated.";
            if(prompt.includes("bigger")) {
                document.getElementById('code-editor').value = "cube([50, 50, 50], center=true);";
                render3D();
            }
        }, 800);
    }

    function downloadSCAD() {
        const link = document.createElement('a');
        link.href = 'data:text/plain;charset=utf-8,' + encodeURIComponent(document.getElementById('code-editor').value);
        link.download = 'model.scad';
        link.click();
    }

    function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
    }
</script>
</body>
</html>
